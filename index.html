<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESV Grein – Trainingssystem</title>

<style>
:root{
    --green:#1f5e3a;
    --red:#b93a32;
    --gold:#ffdf8c;
    --dark:#102417;
    --light:#eef5e9;
    --border:#d7e4cf;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Segoe UI,Arial,sans-serif;
    background:linear-gradient(135deg,#17351f,#0d1f13);
    color:#222;
    height:100vh;
    overflow:hidden;
}

.header{
    position:sticky;
    top:0;
    z-index:1000;
    background:var(--green);
    color:white;
    padding:14px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:12px;
}

.header h1{
    font-size:1.6rem;
}

.header-controls{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
}

button,
select,
input{
    border:none;
    border-radius:12px;
    padding:10px 14px;
    font-size:1rem;
}

button{
    cursor:pointer;
    background:var(--green);
    color:white;
    font-weight:700;
}

.layout{
    display:flex;
    justify-content:center;
    padding:16px;
    height:calc(100vh - 90px);
    overflow:hidden;
}

.arena{
    width:100%;
    max-width:1200px;
    background:white;
    border-radius:22px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
    display:flex;
    flex-direction:column;
    height:100%;
}

.arena-header{
    background:var(--light);
    padding:12px 16px;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-shrink:0;
}

.arena-title{
    font-size:1.6rem;
    font-weight:900;
    color:var(--green);
    text-align:center;
}

.scoreboard{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    padding:0 14px 14px;
    flex-shrink:0;
}

.score-card{
    background:#f7faf5;
    border-radius:18px;
    padding:16px 20px;
    text-align:center;
    border-bottom:8px solid var(--green);
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.score-card.red{
    border-bottom-color:var(--red);
}

.team-info{
    display:flex;
    flex-direction:column;
    align-items:flex-start;
    gap:2px;
}

.team-name{
    font-size:1.2rem;
    font-weight:900;
}

.team-score{
    font-size:3.4rem;
    font-weight:900;
    color:var(--green);
    line-height:1;
}

.score-card.red .team-score{
    color:var(--red);
}

.team-wins{
    display:flex;
    align-items:center;
    gap:8px;
    background:var(--dark);
    color:white;
    padding:6px 16px;
    border-radius:10px;
    font-weight:700;
    font-size:1.2rem;
    white-space:nowrap;
}

.team-wins span{
    font-size:1.4rem;
}

/* Kehren-Bereich - scrollbar */
.kehren-wrapper{
    flex:1;
    overflow-y:auto;
    padding:0 14px 14px;
    min-height:0;
}

.kehren-wrapper::-webkit-scrollbar{
    width:8px;
}

.kehren-wrapper::-webkit-scrollbar-track{
    background:#f0f0f0;
    border-radius:10px;
}

.kehren-wrapper::-webkit-scrollbar-thumb{
    background:var(--green);
    border-radius:10px;
}

.kehren-wrapper::-webkit-scrollbar-thumb:hover{
    background:#0d3d22;
}

.kehren{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
}

.kehren-title{
    text-align:center;
    font-weight:900;
    margin-bottom:8px;
}

.kehre-row{
    display:grid;
    grid-template-columns:90px 1fr 45px;
    gap:8px;
    align-items:center;
    background:white;
    border:1px solid var(--border);
    border-radius:14px;
    padding:8px;
    margin-bottom:8px;
}

.kehre-row.active{
    border:3px solid #4caf50;
    background:#f3fff2;
}

.kehre-row.completed{
    border:3px solid #ff9800;
    background:#fff8e1;
}

.kehre-number{
    font-size:.9rem;
    font-weight:900;
    text-align:center;
}

.points{
    display:flex;
    gap:5px;
    justify-content:center;
    flex-wrap:wrap;
}

.point-btn{
    min-width:34px;
    min-height:34px;
    border-radius:8px;
    border:2px solid var(--border);
    background:white;
    color:black;
    font-weight:900;
}

.point-btn:hover{
    background:var(--green);
    color:white;
}

.point-btn.active-point{
    background:var(--green);
    color:white;
}

.kehre-value{
    text-align:center;
    font-weight:900;
    font-size:1.1rem;
}

.footer{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    padding:14px;
    border-top:1px solid var(--border);
    flex-shrink:0;
}

.footer .footer-left {
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.footer .footer-right {
    font-size:0.85rem;
    color:#555;
    background:var(--light);
    padding:4px 14px;
    border-radius:30px;
    font-weight:500;
    letter-spacing:0.3px;
}

.gold{
    background:var(--gold);
    color:black;
}

.toast{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:#111;
    color:white;
    padding:14px 20px;
    border-radius:14px;
    opacity:0;
    transition:.3s;
    z-index:9999;
}

.toast.show{
    opacity:1;
}

.player-selector{
    display:flex;
    gap:8px;
    align-items:center;
    background:rgba(255,255,255,0.15);
    padding:4px 12px 4px 8px;
    border-radius:40px;
}

.player-selector label{
    font-weight:600;
    font-size:0.9rem;
}

.player-selector select{
    background:white;
    color:black;
    padding:6px 10px;
    border-radius:30px;
    font-weight:700;
}

/* Dialog für Kehrenauswahl */
.kehren-dialog-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.5);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 10000;
}

.kehren-dialog-overlay.show {
    display: flex;
}

.kehren-dialog {
    background: white;
    border-radius: 22px;
    padding: 30px;
    max-width: 400px;
    width: 90%;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
}

.kehren-dialog h3 {
    margin-bottom: 16px;
    color: var(--green);
    font-size: 1.4rem;
}

.kehren-dialog select {
    width: 100%;
    padding: 12px;
    border: 2px solid var(--border);
    border-radius: 12px;
    font-size: 1.1rem;
    margin-bottom: 16px;
}

.kehren-dialog .dialog-buttons {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
}

.kehren-dialog .dialog-buttons button {
    padding: 10px 20px;
    border-radius: 12px;
    font-weight: 700;
}

.kehren-dialog .dialog-buttons .btn-cancel {
    background: #ccc;
    color: #333;
}

.kehren-dialog .dialog-buttons .btn-confirm {
    background: var(--red);
    color: white;
}
</style>
</head>
<body>

<div class="header">
    <h1>🥌 ESV Grein – Trainingssystem</h1>

    <div class="header-controls">
        <!-- Spielerauswahl 3-6 -->
        <div class="player-selector">
            <label for="playerCount">👥 Spieler</label>
            <select id="playerCount">
                <option value="3">3</option>
                <option value="4"selected>4</option>
                <option value="5">5</option>
                <option value="6">6</option>
            </select>
        </div>

        <select id="gamesSelect">
            <option value="2"selected>2 Siege</option>
            <option value="3">3 Siege</option>
            <option value="4">4 Siege</option>
            <option value="5">5 Siege</option>
            <option value="6">6 Siege</option>
        </select>

        <select id="kehrenSelect">
             <option value="4">4 Kehren</option>
            <option value="6" selected>6 Kehren</option>
            <option value="8">8 Kehren</option>
        </select>

        <button onclick="fullReset()">🆕 Reset</button>
    </div>
</div>

<div class="layout" id="layout"></div>

<!-- Dialog für Kehrenauswahl -->
<div class="kehren-dialog-overlay" id="kehrenDialog">
    <div class="kehren-dialog">
        <h3>🧹 Kehre zum Löschen auswählen</h3>
        <select id="kehrenSelectDialog"></select>
        <div class="dialog-buttons">
            <button class="btn-cancel" onclick="closeKehrenDialog()">Abbrechen</button>
            <button class="btn-confirm" onclick="confirmDeleteKehre()">Löschen</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
const state = {
    kehren:6,
    winsToChampion:2,
    playerCount:4,  // 3-6
    arena:createArena(1)
};

function createArena(id){
    return {
        id,
        teamA:`Mannschaft W`,
        teamB:`Mannschaft E`,
        pointsA:Array(6).fill(null),
        pointsB:Array(6).fill(null),
        winsA:0,
        winsB:0
    };
}

function render(){
    document.getElementById('layout').innerHTML = renderArena(state.arena);
}

function renderArena(arena){

    const scoreA = sum(arena.pointsA);
    const scoreB = sum(arena.pointsB);

    return `
    <div class="arena">

        <div class="arena-header">
            <div class="arena-title">🥌 ESV Grein – Training</div>
        </div>

        <div class="scoreboard">

            <div class="score-card">
                <div class="team-info">
                    <div class="team-name">⚪ Mannschaft W</div>
                    <div class="team-score">${scoreA}</div>
                </div>
                <div class="team-wins">
                    <span>🏆</span> ${arena.winsA}
                </div>
            </div>

            <div class="score-card red">
                <div class="team-info">
                    <div class="team-name">🔴 Mannschaft E</div>
                    <div class="team-score">${scoreB}</div>
                </div>
                <div class="team-wins">
                    <span>🏆</span> ${arena.winsB}
                </div>
            </div>

        </div>

        <!-- Scrollbarer Kehren-Bereich -->
        <div class="kehren-wrapper">
            <div class="kehren">
                <div>
                    <div class="kehren-title">⚪ Mannschaft W</div>
                    ${renderKehren(arena,'A')}
                </div>

                <div>
                    <div class="kehren-title">🔴 Mannschaft E</div>
                    ${renderKehren(arena,'B')}
                </div>
            </div>
        </div>

        <div class="footer">
            <div class="footer-left">
                <button class="gold" onclick="evaluateGame()">🏆 Spiel werten</button>
                <button onclick="resetCurrent()">🔄 Kehren löschen</button>
                <button onclick="resetGame()">🔄 Spiel neu starten</button>
                <button onclick="openKehrenDialog()">🧹 Kehre löschen</button>
            </div>
            <div class="footer-right">@by Roland Koll, Version 1.1</div>
        </div>

    </div>
    `;
}

function renderKehren(arena,team){

    let html='';

    const arr = team==='A' ? arena.pointsA : arena.pointsB;

    for(let i=0;i<state.kehren;i++){

        const active = activeKehre(arena)===i+1;
        const isCompleted = arr[i] !== null;

        // Maximalpunkte basierend auf Spieleranzahl: 3 Spieler = max 3, 4=4, 5=5, 6=6
        const maxPoints = state.playerCount;

        html += `
        <div class="kehre-row ${active?'active':''} ${isCompleted?'completed':''}">

            <div class="kehre-number">Kehre ${i+1}</div>

            <div class="points">
                ${Array.from({length: maxPoints + 1}, (_, v) => `
                    <button
                        class="point-btn ${arr[i] === v ? 'active-point' : ''}"
                        onclick="setPoints('${team}',${i},${v})">
                        ${v}
                    </button>
                `).join('')}
            </div>

            <div class="kehre-value">${arr[i] ?? '-'}</div>

        </div>
        `;
    }

    return html;
}

function setPoints(team,index,value){

    const arena = state.arena;

    if(hasWinner(arena)){
        toast('Training beendet');
        return;
    }

    if(team==='A'){
        arena.pointsA[index]=value;
        if(arena.pointsB[index]===null) arena.pointsB[index]=0;
    }else{
        arena.pointsB[index]=value;
        if(arena.pointsA[index]===null) arena.pointsA[index]=0;
    }

    render();
}

function evaluateGame(){

    const arena = state.arena;

    if(hasWinner(arena)){
        toast('Training beendet');
        return;
    }

    // Prüfen ob alle Kehren ausgefüllt sind
    for(let i=0;i<state.kehren;i++){
        if(arena.pointsA[i]===null || arena.pointsB[i]===null){
            toast('Bitte alle Kehren ausfüllen');
            return;
        }
    }

    const a = sum(arena.pointsA);
    const b = sum(arena.pointsB);

    if(a>b){
        arena.winsA++;
        toast(`⚪ Mannschaft W gewinnt das Spiel (${a}:${b})`);
    }
    else if(b>a){
        arena.winsB++;
        toast(`🔴 Mannschaft E gewinnt das Spiel (${a}:${b})`);
    }
    else{
        toast(`Unentschieden (${a}:${b})`);
    }

    // Kehren für nächstes Spiel zurücksetzen
    arena.pointsA = Array(state.kehren).fill(null);
    arena.pointsB = Array(state.kehren).fill(null);

    if(hasWinner(arena)){
        toast(`🏆 ${winnerName(arena)} gewinnt das Training!`);
    }

    render();
}

function activeKehre(arena){
    for(let i=0;i<state.kehren;i++){
        if(arena.pointsA[i]===null || arena.pointsB[i]===null){
            return i+1;
        }
    }
    return state.kehren;
}

function hasWinner(arena){
    return arena.winsA >= state.winsToChampion || arena.winsB >= state.winsToChampion;
}

function winnerName(arena){
    if(arena.winsA >= state.winsToChampion) return 'Mannschaft W';
    if(arena.winsB >= state.winsToChampion) return 'Mannschaft E';
    return '';
}

function sum(arr){
    return arr.reduce((a,b)=>a+(b||0),0);
}

function resetCurrent(){
    state.arena.pointsA = Array(state.kehren).fill(null);
    state.arena.pointsB = Array(state.kehren).fill(null);
    render();
    toast('Alle Kehren wurden gelöscht');
}

function resetGame(){
    const arena = state.arena;
    // Spiel zurücksetzen: Punkte und Siege auf 0, aber Trainingseinstellungen bleiben
    arena.pointsA = Array(state.kehren).fill(null);
    arena.pointsB = Array(state.kehren).fill(null);
    arena.winsA = 0;
    arena.winsB = 0;
    render();
    toast('Spiel wurde neu gestartet (Punkte und Siege zurückgesetzt)');
}

// Dialog-Funktionen für Kehre löschen
function openKehrenDialog(){
    const arena = state.arena;
    if(hasWinner(arena)){
        toast('Training beendet');
        return;
    }
    
    const dialog = document.getElementById('kehrenDialog');
    const select = document.getElementById('kehrenSelectDialog');
    
    // Select mit allen Kehren füllen
    select.innerHTML = '';
    for(let i=0; i<state.kehren; i++){
        const option = document.createElement('option');
        option.value = i;
        const hasValue = arena.pointsA[i] !== null || arena.pointsB[i] !== null;
        option.textContent = `Kehre ${i+1} ${hasValue ? '✏️' : '⬜'}`;
        select.appendChild(option);
    }
    
    dialog.classList.add('show');
}

function closeKehrenDialog(){
    document.getElementById('kehrenDialog').classList.remove('show');
}

function confirmDeleteKehre(){
    const arena = state.arena;
    const select = document.getElementById('kehrenSelectDialog');
    const index = parseInt(select.value);
    
    // Prüfen ob die Kehre überhaupt Werte hat
    if(arena.pointsA[index] === null && arena.pointsB[index] === null){
        toast(`Kehre ${index+1} ist bereits leer`);
        closeKehrenDialog();
        return;
    }
    
    // Kehre löschen
    arena.pointsA[index] = null;
    arena.pointsB[index] = null;
    
    render();
    toast(`Kehre ${index+1} wurde gelöscht`);
    closeKehrenDialog();
}

function fullReset(){
    state.arena = createArena(1);
    render();
    toast('Kompletter Reset durchgeführt');
}

function toast(msg){
    const t=document.getElementById('toast');
    t.textContent=msg;
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),2500);
}

// Event-Listener für Spielerauswahl (3-6)
document.getElementById('playerCount').addEventListener('change', function(e){
    state.playerCount = Number(e.target.value);
    render();
    toast(`👥 ${state.playerCount} Spieler – Kehrenpunkte angepasst`);
});

// Event-Listener für Kehrenauswahl
document.getElementById('kehrenSelect').addEventListener('change', function(e){
    state.kehren = Number(e.target.value);

    state.arena.pointsA = Array(state.kehren).fill(null);
    state.arena.pointsB = Array(state.kehren).fill(null);

    render();
});

// Event-Listener für Siegauswahl
document.getElementById('gamesSelect').addEventListener('change', function(e){
    state.winsToChampion = Number(e.target.value);
    render();
});

render();
</script>

</body>
</html>
